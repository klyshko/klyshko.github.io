{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav site-nav" aria-label="Primary">
        <a class="site-logo-link" href="{{ base_path }}/">
          <span class="site-logo">
            <span class="site-logo__mark">EK</span>
            <span class="site-logo__first">Eugene</span>
            <span class="site-logo__last">Klyshko</span>
          </span>
        </a>
        <button type="button" class="site-nav__burger" id="site-nav-burger" aria-expanded="false" aria-controls="site-nav-menu" aria-label="Open menu">
          <span class="site-nav__burger-line" aria-hidden="true"></span>
          <span class="site-nav__burger-line" aria-hidden="true"></span>
          <span class="site-nav__burger-line" aria-hidden="true"></span>
        </button>
        <ul id="site-nav-menu" class="visible-links site-nav__links">
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <button class="greedy-nav__toggle hidden" type="button" hidden>
          <span class="visually-hidden">Toggle overflow menu</span>
          <div class="navicon"></div>
        </button>
        <ul class="hidden-links hidden" aria-hidden="true"></ul>
      </nav>
    </div>
  </div>
</div>
